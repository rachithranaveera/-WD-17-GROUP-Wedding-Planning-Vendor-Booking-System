<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Contact Us - Wedding Planner</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .contact-container {
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>
<div th:replace="~{fragments :: navbar}"></div>

<div class="contact-container">
    <h2>Contact Us</h2>
    <p>Have questions? We'd love to hear from you!</p>

    <p th:if="${param.success}" style="color: green; font-weight: bold; margin-bottom: 15px;">
        ✔ Your message has been sent successfully! We will get back to you soon.
    </p>

    <form th:action="@{/contact}" method="post">
        <div class="form-group">
            <label>Your Name</label>
            <input type="text" name="name" required placeholder="e.g. Jane Doe">
        </div>
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="email" required placeholder="you@example.com">
        </div>
        <div class="form-group">
            <label>Subject</label>
            <input type="text" name="subject" required placeholder="What is this regarding?">
        </div>
        <div class="form-group">
            <label>Message</label>
            <textarea name="message" rows="5" required placeholder="Type your message here..."></textarea>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Send Message</button>
    </form>
</div>
</body>
</html>
