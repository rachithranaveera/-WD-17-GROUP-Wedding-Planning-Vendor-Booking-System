<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Login - Forever Yours</title>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#963c43",         /* Premium Burgundy / Deep Rose */
                        "primary-hover": "#7d2a31",
                        "background": "#fcf9f8",      /* Soft Luxury Ivory Canvas */
                        "surface": "#ffffff",
                        "text-main": "#1b1c1c",
                        "text-muted": "#554242",
                        "border-light": "#e4e2e1",
                        "accent-error": "#ba1a1a"     /* Crisp Crimson */
                    },
                    fontFamily: {
                        "display": ["EB Garamond", "serif"],
                        "sans": ["Source Sans 3", "sans-serif"]
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Source Sans 3', sans-serif; background-color: #fcf9f8; }
        .font-display { font-family: 'EB Garamond', serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24; }
    </style>
</head>
<body class="text-text-main min-h-screen flex flex-col justify-between">

<div th:replace="~{fragments :: navbar}"></div>

<main class="w-full flex-grow flex items-center justify-center p-4 sm:p-6 lg:p-8">
    <div class="w-full max-w-md bg-surface border border-border-light rounded-2xl p-6 sm:p-10 shadow-sm space-y-6">

        <div class="text-center space-y-1">
            <h2 class="text-3xl font-display font-semibold text-text-main">Welcome Back</h2>
            <p class="text-xs text-text-muted">Enter your system profile handles to access your planning portals.</p>
        </div>

        <div th:if="${error}" class="bg-rose-50/60 border border-rose-100 rounded-xl p-4 flex items-start gap-3 animate-fade-in">
            <span class="material-symbols-outlined text-accent-error mt-0.5">error</span>
            <div>
                <h4 class="text-sm font-semibold text-accent-error">Authentication Halt</h4>
                <p class="text-xs text-accent-error/80 mt-0.5" th:text="${error}">Invalid credentials provided.</p>
            </div>
        </div>

        <form th:action="@{/login}" method="post" class="space-y-4">

            <div class="space-y-1">
                <label class="block text-xs uppercase tracking-wider font-semibold text-text-muted">Username or Handle</label>
                <input type="text" name="username" required placeholder="Enter username"
                       class="w-full text-sm bg-background border border-border-light rounded-lg p-3 text-text-main focus:ring-1 focus:ring-primary focus:border-primary outline-none transition-all placeholder:text-text-muted/30" />
            </div>

            <div class="space-y-1">
                <label class="block text-xs uppercase tracking-wider font-semibold text-text-muted">Password</label>
                <input type="password" name="password" required placeholder="••••••••"
                       class="w-full text-sm bg-background border border-border-light rounded-lg p-3 text-text-main focus:ring-1 focus:ring-primary focus:border-primary outline-none transition-all placeholder:text-text-muted/30" />
            </div>

            <button type="submit" class="w-full bg-primary hover:bg-primary-hover text-white text-xs font-semibold uppercase tracking-widest py-3.5 rounded-full shadow-sm transition-colors duration-150 mt-2">
                Sign In
            </button>
        </form>

        <div class="text-center pt-2 border-t border-border-light/40">
            <p class="text-xs text-text-muted">
                Don't have an account?
                <a href="/register" class="text-primary font-semibold hover:underline ml-1">Sign up here</a>
            </p>
        </div>

    </div>
</main>

<footer class="w-full bg-surface border-t border-border-light py-6 text-center text-xs text-text-muted">
    <p>© 2026 Forever Yours. Curating Timeless Sri Lankan Weddings.</p>
</footer>

</body>
</html>
