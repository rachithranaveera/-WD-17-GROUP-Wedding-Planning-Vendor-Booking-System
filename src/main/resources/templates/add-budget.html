<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Budget Item</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f8f0f5;
        }
        h1 { color: #8B5E83; }
        .form-card {
            background: white;
            padding: 30px;
            border-radius: 10px;
            max-width: 500px;
        }
        label {
            display: block;
            margin-top: 10px;
            color: #8B5E83;
            font-weight: bold;
        }
        input, select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .btn-submit {
            margin-top: 20px;
            background-color: #8B5E83;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
        }
        .btn-back {
            display: inline-block;
            margin-bottom: 15px;
            color: #8B5E83;
            text-decoration: none;
        }
    </style>
</head>
<body>

<h1>💍 Add Budget Item</h1>

<a href="/budget" class="btn-back">← Back to Summary</a>

<div class="form-card">
    <form action="/budget/add" method="post">

        <label>Category:</label>
        <select name="category">
            <option value="VENUE">Venue</option>
            <option value="CATERING">Catering</option>
            <option value="PHOTOGRAPHY">Photography</option>
            <option value="FLOWERS">Flowers</option>
            <option value="MUSIC">Music</option>
            <option value="TRANSPORT">Transport</option>
            <option value="OTHER">Other</option>
        </select>

        <label>Estimated Cost (Rs.):</label>
        <input type="number" name="estimatedCost"
               placeholder="Enter estimated cost" required/>

        <label>Actual Cost (Rs.):</label>
        <input type="number" name="actualCost"
               placeholder="Enter actual cost" required/>

        <label>Type:</label>
        <select name="type">
            <option value="FIXED">Fixed Expense</option>
            <option value="VARIABLE">Variable Expense</option>
        </select>

        <label>Paid:</label>
        <select name="isPaid">
            <option value="true">Yes</option>
            <option value="false">No</option>
        </select>

        <button type="submit" class="btn-submit">
            Add Budget Item
        </button>

    </form>
</div>

</body>
</html>
