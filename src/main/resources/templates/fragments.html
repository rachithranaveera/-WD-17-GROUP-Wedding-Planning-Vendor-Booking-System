<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
</head>
<body>

<div th:fragment="navbar" class="fixed top-0 w-full z-50 bg-surface/80 backdrop-blur-md border-b border-border-light/40 shadow-sm transition-all duration-200">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex items-center justify-between h-20">

        <div class="flex items-center gap-base">
            <span class="material-symbols-outlined text-primary text-2xl" style="font-variation-settings: 'FILL' 0, 'wght' 300;">ring_volume</span>
            <a href="/" class="font-display text-2xl text-primary font-medium tracking-tight hover:opacity-90 transition-opacity">
                Forever Yours
            </a>
        </div>

        <nav class="flex items-center gap-6 text-xs font-semibold uppercase tracking-wider text-text-muted">

            <th:block th:if="${session.user == null}">
                <a href="/" class="hover:text-primary transition-colors duration-150">Home</a>
                <a href="/login" class="hover:text-primary transition-colors duration-150">Login</a>
                <a href="/register" class="bg-primary hover:bg-primary-hover text-white px-5 py-2.5 rounded-full transition-colors duration-150 shadow-sm">Sign Up</a>
            </th:block>

            <th:block th:if="${session.user != null && session.user.getClass().getSimpleName() == 'Admin'}">
                <a href="/admin/dashboard" class="hover:text-primary transition-colors duration-150 flex items-center gap-1.5">
                    <span class="material-symbols-outlined text-base">dashboard</span> Console
                </a>
                <a href="/admin/vendors/add" class="hover:text-primary transition-colors duration-150 flex items-center gap-1.5">
                    <span class="material-symbols-outlined text-base">add_box</span> Add Vendor
                </a>

                <div class="h-4 w-[1px] bg-border-light"></div>
                <a href="/logout" class="inline-flex items-center gap-1 border border-primary/20 text-primary hover:bg-primary/5 px-4 py-2 rounded-full transition-colors duration-150">
                    Logout (<span class="font-bold normal-case" th:text="${session.user.fullName}">Admin</span>)
                </a>
            </th:block>

            <th:block th:if="${session.user != null && session.user.getClass().getSimpleName() == 'Couple'}">
                <a href="/" class="hover:text-primary transition-colors duration-150">Home</a>
                <a href="/couple/dashboard" class="hover:text-primary transition-colors duration-150 flex items-center gap-1.5">
                    <span class="material-symbols-outlined text-base">window</span> Dashboard
                </a>
                <a href="/contact" class="hover:text-primary transition-colors duration-150 flex items-center gap-1.5">
                    <span class="material-symbols-outlined text-base">mail</span> Contact Us
                </a>

                <div class="h-4 w-[1px] bg-border-light"></div>
                <a href="/logout" class="inline-flex items-center gap-1 border border-primary/20 text-primary hover:bg-primary/5 px-4 py-2 rounded-full transition-colors duration-150">
                    Logout (<span class="font-bold normal-case" th:text="${session.user.fullName}">Couple Name</span>)
                </a>
            </th:block>

        </nav>
    </div>
</div>

</body>
</html>
