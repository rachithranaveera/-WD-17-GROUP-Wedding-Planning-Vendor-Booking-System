<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
</head>
<body>
    <div th:fragment="navbar" class="navbar">
        <div class="navbar-brand">
            <a href="/">Wedding Planner</a>
        </div>
        <div class="navbar-links">
            <!-- Guest Links -->
            <th:block th:if="${session.user == null}">
                <a href="/">Home</a>
                <a href="/login">Login</a>
                <a href="/register">Sign Up</a>
            </th:block>

            <!-- Admin Links -->
            <th:block th:if="${session.user != null && session.user.getClass().getSimpleName() == 'Admin'}">
                <a href="/admin/dashboard">Admin Dashboard</a>
                <a href="/admin/vendors/add">Add Vendor</a>
                <a href="/logout" class="logout-link">Logout (<span th:text="${session.user.fullName}"></span>)</a>
            </th:block>

            <!-- Couple Links -->
            <th:block th:if="${session.user != null && session.user.getClass().getSimpleName() == 'Couple'}">
                <a href="/couple/dashboard">Couple Dashboard</a>
                <a href="/logout" class="logout-link">Logout (<span th:text="${session.user.fullName}"></span>)</a>
                <a href="/">Home</a>
                <a href="/contact">Contact Us</a> 
            </th:block>
        </div>
    </div>
</body>
</html>
