<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Budget Summary</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f8f0f5;
        }
        h1 {
            color: #8B5E83;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }
        th {
            background-color: #8B5E83;
            color: white;
            padding: 10px;
        }
        td {
            padding: 10px;
            border: 1px solid #ddd;
            text-align: center;
        }
        .btn {
            padding: 5px 10px;
            border-radius: 5px;
            text-decoration: none;
            color: white;
        }
        .btn-edit { background-color: #C9A96E; }
        .btn-delete { background-color: #c0392b; }
        .btn-add {
            background-color: #8B5E83;
            padding: 10px 20px;
            border-radius: 5px;
            color: white;
            text-decoration: none;
        }
        .summary {
            background: white;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<h1>💍 Budget Summary</h1>

<div class="summary">
    <h3>Total Estimated: Rs. <span
            th:text="${totalEstimated}"></span></h3>
    <h3>Total Actual: Rs. <span
            th:text="${totalActual}"></span></h3>
</div>

<a href="/budget/add" class="btn-add">+ Add Budget Item</a>
<br><br>

<table>
    <tr>
        <th>Category</th>
        <th>Estimated (Rs.)</th>
        <th>Actual (Rs.)</th>
        <th>Paid</th>
        <th>Type</th>
        <th>Actions</th>
    </tr>
    <tr th:each="item : ${items}">
        <td th:text="${item.category}"></td>
        <td th:text="${item.estimatedCost}"></td>
        <td th:text="${item.actualCost}"></td>
        <td th:text="${item.paid} ? 'Yes' : 'No'"></td>
        <td th:text="${item.toString().split(',')[6]}"></td>
        <td>
            <a th:href="@{/budget/edit/{id}
                (id=${item.budgetId})}"
               class="btn btn-edit">Edit</a>
            <a th:href="@{/budget/delete/{id}
                (id=${item.budgetId})}"
               class="btn btn-delete">Delete</a>
        </td>
    </tr>
</table>

</body>
</html>
