<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Welcome - Forever Yours</title>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#963c43",         /* Premium Deep Rose */
                        "primary-hover": "#7d2a31",
                        "background": "#fcf9f8",      /* Luxury Ivory/Champagne Canvas */
                        "surface": "#ffffff",
                        "text-main": "#1b1c1c",
                        "text-muted": "#554242",
                        "border-light": "#e4e2e1"
                    },
                    fontFamily: {
                        "display": ["EB Garamond", "serif"],
                        "sans": ["Source Sans 3", "sans-serif"]
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Source Sans 3', sans-serif; background-color: #fcf9f8; }
        .font-display { font-family: 'EB Garamond', serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24; }
    </style>
</head>
<body class="text-text-main min-h-screen flex flex-col justify-between">

<div th:replace="~{fragments :: navbar}"></div>

<main class="w-full flex-grow flex items-center justify-center relative overflow-hidden py-24 px-4 sm:px-6 lg:px-8">
    <div class="absolute inset-0 z-0 opacity-40">
        <div class="absolute top-[-10%] left-[-10%] w-[50vw] h-[50vw] rounded-full bg-primary/5 filter blur-[120px]"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[40vw] h-[40vw] rounded-full bg-primary/5 filter blur-[100px]"></div>
    </div>

    <div class="relative z-10 max-w-4xl text-center space-y-12">

        <div class="space-y-4">
            <span class="inline-flex items-center gap-1.5 text-xs font-semibold uppercase tracking-widest text-primary bg-primary/5 px-4 py-1.5 rounded-full border border-primary/10">
                <span class="material-symbols-outlined text-sm">auto_awesome</span> Timeless Curation
            </span>
            <h1 class="text-5xl sm:text-7xl font-display font-medium tracking-tight text-text-main leading-none">
                Welcome to <span class="text-primary italic">Forever Yours</span>
            </h1>
            <p class="text-text-muted text-lg sm:text-xl font-light max-w-xl mx-auto leading-relaxed">
                Your luxury editorial solution for orchestrating seamless, breathtaking wedding realities.
            </p>
        </div>

        <div class="flex items-center justify-center gap-4 max-w-xs mx-auto">
            <div class="h-[1px] bg-border-light flex-1"></div>
            <span class="material-symbols-outlined text-primary/40 text-sm">favorite</span>
            <div class="h-[1px] bg-border-light flex-1"></div>
        </div>

        <div class="flex flex-col sm:flex-row items-center justify-center gap-4 max-w-md mx-auto">
            <a href="/login" class="w-full sm:w-auto bg-primary hover:bg-primary-hover text-white text-xs font-semibold uppercase tracking-widest px-8 py-4 rounded-full shadow-sm transition-all duration-150 text-center">
                Access Dashboard
            </a>
            <a href="/register" class="w-full sm:w-auto bg-surface hover:bg-background border border-border-light text-text-main text-xs font-semibold uppercase tracking-widest px-8 py-4 rounded-full shadow-sm transition-all duration-150 text-center">
                Create Registry
            </a>
        </div>

    </div>
</main>

<footer class="w-full bg-surface border-t border-border-light py-6 text-center text-xs text-text-muted relative z-10">
    <p>© 2026 Forever Yours. Curating Timeless Sri Lankan Weddings.</p>
</footer>

</body>
</html>
