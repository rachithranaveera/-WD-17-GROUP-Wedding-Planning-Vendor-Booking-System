<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Couple Dashboard - Wedding Planner</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments :: navbar}"></div>
<div class="container">
    <h2>Welcome, <span th:text="${couple.fullName}"></span></h2>

    <div class="budget-section">
        <h3>Estimated Budget Tracking</h3>
        <p>Total Budget: $<span th:text="${couple.estimatedBudget}"></span></p>
        <p>Confirmed Spending: $<span th:text="${spent}"></span></p>
        <p>Remaining: $<span th:text="${remaining}"></span></p>
    </div>

    <h3>Available Vendors</h3>
    <table>
        <thead>
        <tr>
            <th>Name</th>
            <th>Category</th>
            <th>Price</th>
            <th>Description</th>
            <th>Book Now</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="vendor : ${vendors}">
            <td th:text="${vendor.name}"></td>
            <td th:text="${vendor.category}"></td>
            <td th:text="${vendor.price}"></td>
            <td th:text="${vendor.description}"></td>
            <td>
                <form th:action="@{/couple/book}" method="post">
                    <input type="hidden" name="vendorId" th:value="${vendor.id}">
                    <input type="date" name="date" required>
                    <button type="submit" class="btn btn-primary">Book</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

    <hr style="margin: 40px 0; border: 1px solid #eee;">


</div>
</body>
</html>
