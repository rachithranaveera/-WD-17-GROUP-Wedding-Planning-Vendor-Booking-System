<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Dashboard - Wedding Planner</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments :: navbar}"></div>
<div class="container">
    <h2>Admin Dashboard</h2>

    <h3>Manage Bookings</h3>
    <table>
        <thead>
        <tr>
            <th>Couple</th>
            <th>Vendor</th>
            <th>Date</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="booking : ${bookings}">
            <td th:text="${booking.couple.fullName}"></td>
            <td th:text="${booking.vendor.name}"></td>
            <td th:text="${booking.bookingDate}"></td>
            <td th:text="${booking.status}"></td>
            <td>
                <form th:action="@{/admin/bookings/update}" method="post" style="display:inline;">
                    <input type="hidden" name="bookingId" th:value="${booking.id}">
                    <input type="hidden" name="status" value="CONFIRMED">
                    <button type="submit" class="btn btn-success" th:disabled="${booking.status == 'CONFIRMED'}">Accept</button>
                </form>
                <form th:action="@{/admin/bookings/update}" method="post" style="display:inline;">
                    <input type="hidden" name="bookingId" th:value="${booking.id}">
                    <input type="hidden" name="status" value="REJECTED">
                    <button type="submit" class="btn btn-danger" th:disabled="${booking.status == 'REJECTED'}">Reject</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

    <h3>User Management</h3>
    <div style="margin-bottom: 20px;">
        <a href="/admin/users/add-admin" class="btn btn-primary">Add New Admin</a>
    </div>
    <table>
        <thead>
        <tr>
            <th>Full Name</th>
            <th>Username</th>
            <th>Role</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="u : ${users}">
            <td th:text="${u.fullName}"></td>
            <td th:text="${u.username}"></td>
            <td th:text="${u.getClass().getSimpleName()}"></td>
        </tr>
        </tbody>
    </table>

    <h3>Vendor Booking Schedule</h3>
    <table>
        <thead>
        <tr>
            <th>Vendor Name</th>
            <th>Booked Dates</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="vendor : ${vendors}">
            <td th:text="${vendor.name}"></td>
            <td>
                <ul>
                    <li th:each="booking : ${bookings}"
                        th:if="${booking.vendor.id == vendor.id && booking.status == 'CONFIRMED'}"
                        th:text="${booking.bookingDate}">
                    </li>
                </ul>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
